name: NBA Week in Review — Auto-Generate

on:
  schedule:
    # 6:00 AM Arizona time (MST = UTC-7)
    # Arizona does not observe DST — 13:00 UTC year-round
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate NBA Week in Review
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python generate_report.py

      - name: Commit and push report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AVC Intelligence Bot"
          git add docs/index.html docs/og-image.png docs/archive/
          git diff --staged --quiet || git commit -m "NBA Week in Review"
          git push

  deploy-pages:
    needs: generate-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
